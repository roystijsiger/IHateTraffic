<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Beat the traffic! Find the best departure times and avoid traffic jams.">
    <meta name="theme-color" content="#ff6b6b">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Traffic App">
    
    <title>I Hate Traffic Jams 🚦</title>
    <!-- Google Maps API wordt geladen via code in plaats van hier -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    
    <!-- Firebase Service Worker registratie -->
    <script>
      if ('serviceWorker' in navigator) {
        // Only register in production or if file exists
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then((registration) => {
            console.log('Firebase Service Worker registered:', registration);
          })
          .catch((error) => {
            // Silently fail in development - service worker is optional
            console.log('Service Worker not available (this is OK in development):', error.message);
          });
      }
    </script>
  </body>
</html>
